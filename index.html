<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Live Tools | Pro Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4285f4;
            --accent: #9b72cb;
            --bg: #050505;
            --sidebar-w: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }

        /* --- SIDEBAR (ÜÇ ÇİZGİ MENÜ) --- */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: var(--sidebar-w); height: 100%;
            background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1); z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px;
        }
        .sidebar.active { left: 0; }
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; font-size: 1.5rem;
            cursor: pointer; z-index: 1001; color: #fff; background: rgba(255,255,255,0.1);
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }

        .nav-item {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            color: #888; text-decoration: none; border-radius: 12px; transition: 0.3s; margin-bottom: 5px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(66, 133, 244, 0.1); color: var(--primary); }

        /* --- ANA İÇERİK --- */
        .main-content {
            width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;
            transition: 0.4s; position: relative;
        }
        body.menu-open .main-content { margin-left: 140px; filter: blur(5px); pointer-events: none; }

        /* --- OBS MODLARI (TAM EKRAN) --- */
        #obs-container { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 999; background: var(--bg); }
        body[data-obs="true"] #obs-container { display: flex; }
        body[data-obs="true"] .master-ui { display: none; }

        /* --- DASHBOARD UI --- */
        .glass-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 40px; border-radius: 35px; width: 550px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .count-text { font-size: 6rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -3px; }
        .pfp-main { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 20px; display: none; }

        .search-bar { background: rgba(0,0,0,0.3); border: 1px solid #222; padding: 15px 20px; border-radius: 15px; color: #fff; width: 100%; margin-bottom: 20px; font-size: 1rem; }

        /* --- MOD TASARIMLARI --- */
        .fsabone { width: 100%; height: 100%; display: flex; align-items: center; justify-content: flex-start; padding-left: 8%; gap: 40px; }
        .fsabone img { width: 220px; height: 220px; border-radius: 50%; border: 8px solid var(--accent); }
        .fsabone .vals { font-size: 10rem; font-weight: 900; line-height: 0.9; }

        .fscenter { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .fscenter img { width: 280px; border-radius: 50%; border: 10px solid #fff; margin-bottom: 30px; box-shadow: 0 0 50px rgba(255,255,255,0.3); }
        .fscenter .vals { font-size: 12rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 30px; font-weight: 900; color: var(--primary);">YT TOOLS</h2>
        <a href="#" class="nav-item active"><i class="fas fa-chart-line"></i> Canlı Abone Sayacı</a>
        <a href="#" class="nav-item"><i class="fas fa-video"></i> Stream Overlay</a>
        <a href="#" class="nav-item"><i class="fas fa-comment"></i> Chat Widget (Yakında)</a>
        <a href="#" class="nav-item"><i class="fas fa-bell"></i> Alert Box (Yakında)</a>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <div style="color: #444; font-size: 0.8rem;">Sürüm v3.0.0 Global</div>
    </div>

    <div id="obs-container"></div>

    <div class="main-content master-ui">
        <div class="glass-card">
            <div id="status" style="font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px;">MARKET READY</div>
            <input type="text" id="searchInput" class="search-bar" placeholder="Kanal adını yazın..." onkeyup="if(event.key==='Enter') search()">
            
            <img id="mainPfp" class="pfp-main" src="">
            <h2 id="channelName">Kanal Seçin</h2>
            <div id="mainCount" class="count-text">0</div>

            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button onclick="setObsMode('fsabone')" style="flex: 1; padding: 15px; border-radius: 12px; border: none; background: #111; color: #fff; cursor: pointer;">Sol Mod</button>
                <button onclick="setObsMode('fscenter')" style="flex: 1; padding: 15px; border-radius: 12px; border: none; background: #111; color: #fff; cursor: pointer;">Orta Mod</button>
            </div>
            <button onclick="copyLink()" style="width: 100%; margin-top: 10px; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer;">LİNKİ KOPYALA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            storageBucket: "ytsayac-9efe7.firebasestorage.app",
            databaseURL: "https://ytsayac-9efe7-default-rtdb.firebaseio.com",
            messagingSenderId: "877769345664",
            appId: "1:877769345664:web:b5fa6717f18e3217bfb465"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const YT_KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';

        let curId = '';
        let curMode = '';
        let oldVal = 0;

        // --- SİSTEM BAŞLATMA ---
        window.onload = () => {
            const url = new URLSearchParams(window.location.search);
            curId = url.get('id');
            curMode = url.get('mode');

            if(curId) {
                if(curMode) document.body.setAttribute('data-obs', 'true');
                startSync(curId);
                setInterval(() => fetchYoutube(curId), 20000);
            }
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.body.classList.toggle('menu-open');
        };

        window.search = async () => {
            const q = document.getElementById('searchInput').value;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${q}&key=${YT_KEY}`);
            const d = await r.json();
            if(d.items[0]) {
                curId = d.items[0].id.channelId;
                fetchYoutube(curId);
                startSync(curId);
            }
        };

        async function fetchYoutube(id) {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${YT_KEY}`);
            const d = await r.json();
            if(d.items[0]) {
                const c = d.items[0];
                set(ref(db, 'channels/' + id), {
                    n: c.snippet.title,
                    s: c.statistics.subscriberCount,
                    p: c.snippet.thumbnails.high.url
                });
            }
        }

        function startSync(id) {
            onValue(ref(db, 'channels/' + id), (s) => {
                const v = s.val();
                if(v) render(v);
            });
        }

        function render(data) {
            const count = parseInt(data.s);
            document.getElementById('channelName').innerText = data.n;
            document.getElementById('mainPfp').src = data.p;
            document.getElementById('mainPfp').style.display = 'inline-block';
            
            animate(oldVal, count);
            oldVal = count;

            // OBS Render
            const obs = document.getElementById('obs-container');
            if(curMode === 'fsabone') {
                obs.innerHTML = `<div class="fsabone"><img src="${data.p}"><div><div style="font-size:3rem;">${data.n}</div><div class="vals">${count.toLocaleString('tr-TR')}</div></div></div>`;
            } else if(curMode === 'fscenter') {
                obs.innerHTML = `<div class="fscenter"><img src="${data.p}"><div class="vals">${count.toLocaleString('tr-TR')}</div><div style="font-size:4rem;">${data.n}</div></div>`;
            }
        }

        function animate(s, e) {
            const obj = document.getElementById("mainCount");
            let start = null;
            const step = (ts) => {
                if (!start) start = ts;
                const prog = Math.min((ts - start) / 1500, 1);
                const val = Math.floor(prog * (e - s) + s);
                obj.innerText = val.toLocaleString('tr-TR');
                if (prog < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        window.setObsMode = (m) => { curMode = m; alert(m + " modu seçildi. Linki kopyalayıp OBS'e yapıştırın."); };

        window.copyLink = () => {
            const u = new URL(window.location.origin + window.location.pathname);
            u.searchParams.set('id', curId);
            if(curMode) u.searchParams.set('mode', curMode);
            navigator.clipboard.writeText(u.href);
            alert("KOPYALANDI!");
        };

    </script>
</body>
</html>
