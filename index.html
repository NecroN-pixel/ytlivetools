<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Live Hub | Global v1.0.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4285f4; --accent: #9b72cb; --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; 
            overflow: hidden; height: 100vh;
        }

        /* --- DİNAMİK ARKA PLAN --- */
        .bg-aura {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(66, 133, 244, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(155, 114, 203, 0.15), transparent 40%);
            animation: auraPulse 10s infinite alternate;
        }
        @keyframes auraPulse { from { opacity: 0.5; } to { opacity: 1; } }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 40px 20px;
        }
        .sidebar.active { left: 0; }
        .menu-btn {
            position: fixed; top: 25px; left: 25px; z-index: 1001; cursor: pointer;
            background: var(--primary); width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        .nav-link {
            padding: 15px; display: flex; align-items: center; gap: 15px;
            color: #777; text-decoration: none; border-radius: 12px; margin-bottom: 8px;
            transition: 0.2s; font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: #fff; border: 1px solid var(--border); }

        /* --- DASHBOARD UI --- */
        .main-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            transition: 0.4s;
        }
        .pro-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 50px; border-radius: 40px; width: 100%; max-width: 550px;
            text-align: center; backdrop-filter: blur(30px); box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .search-input {
            width: 100%; padding: 18px; border-radius: 15px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.5); color: #fff; margin-bottom: 25px; font-size: 1rem;
        }

        .count-display { font-size: 6rem; font-weight: 900; letter-spacing: -3px; margin: 10px 0; }
        .pfp-main { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 20px; }

        /* --- OBS / FULL SCREEN MODE --- */
        #obs-view { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; align-items: center; justify-content: center; z-index: 999; }
        
        /* DATA-MODE SWITCHER (BU KISIM HATALARI ÇÖZER) */
        body[data-view="obs"] .main-container, body[data-view="obs"] .sidebar, body[data-view="obs"] .menu-btn { display: none !important; }
        body[data-view="obs"] #obs-view { display: flex !important; }

        /* --- MOD TASARIMLARI --- */
        .goal-container { width: 600px; text-align: center; }
        .goal-bar { width: 100%; height: 35px; background: rgba(255,255,255,0.05); border-radius: 50px; overflow: hidden; border: 1px solid var(--border); margin: 20px 0; }
        .goal-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1.5s cubic-bezier(0.1, 0, 0, 1); width: 0%; }

        .footer-branding { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
        .btn-copy { width: 100%; padding: 20px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 900; cursor: pointer; margin-top: 20px; }

    </style>
</head>
<body data-view="dashboard">

    <div class="bg-aura"></div>

    <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <h2 style="font-weight: 900; margin-bottom: 30px; color: var(--primary);">YT HUB <span style="font-size: 0.8rem; color: #fff;">v1.0.0</span></h2>
        <div class="nav-link active" onclick="switchTool('sub')"><i class="fas fa-users"></i> Abone Sayacı</div>
        <div class="nav-link" onclick="switchTool('goal')"><i class="fas fa-bullseye"></i> Abone Hedefi</div>
        <div class="nav-link" onclick="switchTool('views')"><i class="fas fa-eye"></i> Toplam İzlenme</div>
        <div class="nav-link" onclick="switchTool('video')"><i class="fas fa-video"></i> Video Sayısı</div>
        <div class="nav-link" onclick="switchTool('alert')"><i class="fas fa-bell"></i> Abone Alert</div>
        <div class="nav-link" onclick="switchTool('mile')"><i class="fas fa-trophy"></i> Kilometre Taşı</div>
        <div class="nav-link" onclick="switchTool('clock')"><i class="fas fa-clock"></i> Yayın Saati</div>
        <div class="nav-link" onclick="switchTool('social')"><i class="fas fa-share-nodes"></i> Sosyal Kartlar</div>
        <div class="nav-link" onclick="switchTool('growth')"><i class="fas fa-chart-line"></i> Analiz Modu</div>
        <div class="nav-link" onclick="switchTool('preview')"><i class="fas fa-image"></i> Küçük Resim Test</div>

        <div style="position: absolute; bottom: 30px; font-size: 0.6rem; color: #333;">
            © 2026 YT LIVE HUB GLOBAL <br> ALL RIGHTS RESERVED.
        </div>
    </div>

    <div class="main-container">
        <div class="pro-card">
            <h4 id="tool-name" style="color: var(--primary); letter-spacing: 3px; font-size: 0.7rem; margin-bottom: 20px;">ABONE SAYACI</h4>
            <input type="text" id="searchInput" class="search-input" placeholder="Kanal adını girin ve Enter..." onkeyup="if(event.key==='Enter') searchChannel()">
            
            <div id="dashboard-content">
                <img id="pfp" class="pfp-main" src="" style="display: none; margin: 0 auto 20px;">
                <h2 id="channel-name" style="font-weight: 600;">Global Sisteme Hoş Geldiniz</h2>
                <div id="count-val" class="count-display">0</div>
            </div>

            <button class="btn-copy" onclick="copyObsLink()">OBS LİNKİNİ KOPYALA</button>
        </div>
    </div>

    <div id="obs-view"></div>

    <div class="footer-branding">GLOBAL YT STREAMING TOOLS • EST 2026</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        // Senin Firebase Bilgilerin
        const firebaseConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            storageBucket: "ytsayac-9efe7.firebasestorage.app",
            databaseURL: "https://ytsayac-9efe7-default-rtdb.firebaseio.com",
            messagingSenderId: "877769345664",
            appId: "1:877769345664:web:b5fa6717f18e3217bfb465"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const YT_KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';

        let curId = '', curTool = 'sub';

        // Sayı Formatlama (3.7K / 1.2M)
        function format(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return n;
        }

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        
        window.switchTool = (t) => {
            curTool = t;
            document.getElementById('tool-name').innerText = t.toUpperCase() + " MODU";
            toggleSidebar();
        };

        window.searchChannel = async () => {
            const q = document.getElementById('searchInput').value;
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&key=${YT_KEY}`);
            const data = await res.json();
            if(data.items[0]) {
                curId = data.items[0].id.channelId;
                startGlobalSync(curId);
            }
        };

        async function startGlobalSync(id) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${YT_KEY}`);
            const data = await res.json();
            const c = data.items[0];
            
            // Firebase Update
            set(ref(db, 'global/' + id), {
                n: c.snippet.title,
                s: c.statistics.subscriberCount,
                v: c.statistics.viewCount,
                vc: c.statistics.videoCount,
                p: c.snippet.thumbnails.medium.url
            });

            onValue(ref(db, 'global/' + id), (snap) => renderUI(snap.val()));
        }

        function renderUI(data) {
            if(!data) return;
            const subs = parseInt(data.s);
            
            // DASHBOARD UPDATE
            document.getElementById('channel-name').innerText = data.n;
            document.getElementById('pfp').src = data.p;
            document.getElementById('pfp').style.display = 'block';
            document.getElementById('count-val').innerText = format(subs);

            // OBS VIEW RENDER (10 MODUN MANTIĞI)
            const obs = document.getElementById('obs-view');
            if(curTool === 'sub') {
                obs.innerHTML = `<div style="text-align:center;"><img src="${data.p}" style="width:200px; border-radius:50%; border:8px solid var(--primary); margin-bottom:20px;"><div style="font-size:3rem; font-weight:700;">${data.n}</div><div style="font-size:12rem; font-weight:900;">${format(subs)}</div></div>`;
            } else if(curTool === 'goal') {
                const goal = Math.ceil(subs / 1000) * 1000;
                const perc = ((subs % 1000) / 1000) * 100;
                obs.innerHTML = `<div class="goal-container"><div style="font-size:2rem; margin-bottom:10px;">Yeni Hedef: ${format(goal)}</div><div class="goal-bar"><div class="goal-fill" style="width:${perc}%"></div></div><div style="font-size:4rem; font-weight:900;">${format(subs)} / ${format(goal)}</div></div>`;
            } else if(curTool === 'views') {
                obs.innerHTML = `<div style="text-align:center;"><i class="fas fa-eye" style="font-size:4rem; color:var(--primary); margin-bottom:20px;"></i><div style="font-size:3rem;">Toplam İzlenme</div><div style="font-size:10rem; font-weight:900;">${format(data.v)}</div></div>`;
            } else if(curTool === 'video') {
                obs.innerHTML = `<div style="text-align:center;"><i class="fas fa-video" style="font-size:4rem; color:var(--accent); margin-bottom:20px;"></i><div style="font-size:3rem;">Video Sayısı</div><div style="font-size:10rem; font-weight:900;">${data.vc}</div></div>`;
            } else {
                obs.innerHTML = `<div style="font-size:3rem; color:var(--primary);">${curTool.toUpperCase()} AKTİF EDİLDİ.</div>`;
            }
        }

        window.copyObsLink = () => {
            if(!curId) return alert("Önce kanal seç!");
            const u = new URL(window.location.href);
            u.searchParams.set('id', curId);
            u.searchParams.set('mode', 'obs');
            u.searchParams.set('tool', curTool);
            navigator.clipboard.writeText(u.href);
            alert("MARKALI OBS LİNKİ KOPYALANDI!");
        };

        // Açılış Kontrolü
        const params = new URLSearchParams(window.location.search);
        if(params.get('mode') === 'obs') {
            document.body.setAttribute('data-view', 'obs');
            curTool = params.get('tool') || 'sub';
            startGlobalSync(params.get('id'));
        }
    </script>
</body>
</html>
