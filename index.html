<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="site-title">YT Live Hub | Ultimate</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4285f4; --accent: #9b72cb; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* Arka Plan Aurası */
        .bg-aura {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(66, 133, 244, 0.15), transparent 50%),
                        radial-gradient(circle at 90% 90%, rgba(155, 114, 203, 0.15), transparent 50%);
            animation: pulse 10s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

        /* Mobil Uyumlu Sidebar */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 40px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1001; cursor: pointer;
            background: var(--primary); width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        .nav-link { padding: 15px; display: flex; align-items: center; gap: 15px; color: #999; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: #fff; border: 1px solid var(--border); }

        /* Ana UI ve Pro Card (Mobil Uyumlu) */
        .main-ui { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .pro-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 30px; border-radius: 30px; width: 100%; max-width: 450px;
            backdrop-filter: blur(30px); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 15px;
        }

        .tool-title { text-align: center; color: var(--primary); letter-spacing: 2px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        
        .input-base { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: #fff; font-size: 1rem; transition: 0.3s; }
        .input-base:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        /* Arama Önerileri */
        .sug-box { background: #111; border-radius: 12px; border: 1px solid var(--border); margin-top: 5px; overflow: hidden; display: none; }
        .sug-item { padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .sug-item:hover { background: var(--primary); }
        .sug-item img { width: 30px; height: 30px; border-radius: 50%; }

        /* Buton */
        .btn-copy { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #fff; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-copy:hover { background: var(--primary); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(66, 133, 244, 0.3); }

        /* OBS / TAM EKRAN MODU */
        #obs-view { display: none; width: 100%; height: 100%; position: fixed; inset: 0; align-items: center; justify-content: center; z-index: 9999; }
        body[data-mode="obs"] .main-ui, body[data-mode="obs"] .sidebar, body[data-mode="obs"] .menu-btn, body[data-mode="obs"] .bg-aura { display: none !important; }
        body[data-mode="obs"] { background: transparent !important; }
        body[data-mode="obs"] #obs-view { display: flex !important; }

    </style>
</head>
<body data-mode="ui">

    <div class="bg-aura"></div>
    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <h2 style="font-weight: 900; margin-bottom: 20px; color: #fff; padding-left: 10px;">YT HUB <span style="color:var(--primary)">PRO</span></h2>
        <div class="nav-link active" onclick="setMode('sub')"><i class="fas fa-users"></i> Abone Sayacı</div>
        <div class="nav-link" onclick="setMode('goal')"><i class="fas fa-bullseye"></i> Abone Hedefi</div>
        <div class="nav-link" onclick="setMode('text')"><i class="fas fa-font"></i> Özel Yayın Yazısı</div>
        <div style="flex: 1;"></div>
        <div style="font-size: 0.7rem; color: #555; text-align: center;">v3.0.0 Ultimate Edition</div>
    </div>

    <div class="main-ui" onclick="closeMenu()">
        <div class="pro-card" onclick="event.stopPropagation()">
            <div class="tool-title" id="t-title">ABONE SAYACI</div>
            
            <div id="settings-area"></div>

            <div id="preview-box" style="text-align: center; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid var(--border);">
                <span style="color:#666; font-size:0.9rem;">OBS Önizlemesi</span>
                <h3 id="pv-name" style="margin-top: 10px; color: #fff;">Bekleniyor...</h3>
                <h1 id="pv-count" style="font-size: 3rem; color: var(--primary);">0</h1>
            </div>

            <button class="btn-copy" onclick="copyLink()"><i class="fas fa-link"></i> OBS LİNKİNİ KOPYALA</button>
        </div>
    </div>

    <div id="obs-view"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, off } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const fConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            databaseURL: "https://ytsayac-9efe7-default-rtdb.firebaseio.com",
        };

        const app = initializeApp(fConfig);
        const db = getDatabase(app);
        const KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';

        let cMode = 'sub', cId = '', cData = null, dbRef = null;

        // --- MATEMATİK KUSURSUZ (20M DÜZELTİLDİ) ---
        const fmt = (num) => {
            let n = Number(num);
            if (isNaN(n)) return "0";
            if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return n.toLocaleString('tr-TR');
        };

        // --- DİNAMİK FONT MOTORU ---
        window.loadFont = (f) => {
            if(!f) return;
            const id = 'f-' + f.replace(/\s+/g, '');
            if(!document.getElementById(id)) {
                const link = document.createElement('link'); link.id = id; link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${f.replace(/\s+/g, '+')}:wght@700;900&display=swap`;
                document.head.appendChild(link);
            }
        };

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');
        window.closeMenu = () => document.getElementById('sidebar').classList.remove('active');

        // --- ARAYÜZ DEĞİŞTİRİCİ ---
        window.setMode = (m) => {
            cMode = m;
            document.getElementById('t-title').innerText = m === 'sub' ? 'ABONE SAYACI' : m === 'goal' ? 'ABONE HEDEFİ' : 'ÖZEL YAYIN YAZISI';
            
            document.querySelectorAll('.nav-link').forEach(e => e.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const area = document.getElementById('settings-area');
            const pvBox = document.getElementById('preview-box');
            
            if(m === 'sub' || m === 'goal') {
                pvBox.style.display = 'block';
                area.innerHTML = `
                    <input type="text" class="input-base" placeholder="Kanal Ara (Örn: PewDiePie)" onkeyup="search(this.value)">
                    <div id="sug" class="sug-box"></div>
                    ${m === 'goal' ? '<input type="number" id="inp-goal" class="input-base" placeholder="Hedef Sayı (Örn: 10000)" style="margin-top:10px;" value="10000">' : ''}
                `;
            } else if (m === 'text') {
                pvBox.style.display = 'none'; // Text modunda preview'a gerek yok, kartı küçült.
                area.innerHTML = `
                    <input type="text" id="inp-txt" class="input-base" placeholder="Ekranda Ne Yazsın?" value="Kanala Abone Ol!">
                    <input type="text" id="inp-font" class="input-base" placeholder="Font (Örn: Bebas Neue, Oswald)" value="Bebas Neue">
                    <div style="display:flex; gap:10px;">
                        <input type="color" id="inp-color" class="input-base" style="padding:2px; height:50px;" value="#ffffff">
                        <input type="number" id="inp-size" class="input-base" placeholder="Boyut px" value="80">
                    </div>
                `;
            }
            toggleMenu();
        };

        // --- ARAMA VE BAĞLANTI (BUG'SIZ) ---
        window.search = async (v) => {
            if(v.length < 3) return;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=4&q=${v}&key=${KEY}`);
            const d = await r.json();
            const sug = document.getElementById('sug'); sug.innerHTML = '';
            d.items.forEach(i => {
                const div = document.createElement('div'); div.className = 'sug-item';
                div.innerHTML = `<img src="${i.snippet.thumbnails.default.url}"> <span>${i.snippet.title}</span>`;
                div.onclick = () => { sync(i.id.channelId); sug.style.display = 'none'; };
                sug.appendChild(div);
            });
            sug.style.display = 'block';
        };

        async function sync(id) {
            cId = id;
            if(dbRef) off(dbRef); // ESKİ BAĞLANTIYI KOPAR (TAKILI KALMA ÇÖZÜMÜ)

            const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${KEY}`);
            const d = await r.json(); const c = d.items[0];

            set(ref(db, 'v3/' + id), { n: c.snippet.title, s: c.statistics.subscriberCount, p: c.snippet.thumbnails.high.url });
            
            dbRef = ref(db, 'v3/' + id);
            onValue(dbRef, (snap) => { cData = snap.val(); render(); });
        }

        // --- OBS RENDER MOTORU ---
        function render() {
            if(!cData && (cMode === 'sub' || cMode === 'goal')) return;
            
            // Dashboard Güncelle
            if(cMode === 'sub' || cMode === 'goal') {
                document.getElementById('pv-name').innerText = cData.n;
                document.getElementById('pv-count').innerText = fmt(cData.s);
            }

            // OBS Güncelle
            const obs = document.getElementById('obs-view');
            if(cMode === 'sub') {
                obs.innerHTML = `<div style="text-align:center; font-family:sans-serif; color:#fff;">
                    <img src="${cData.p}" style="width:200px; border-radius:50%; border:8px solid var(--primary); margin-bottom:15px; box-shadow:0 0 30px rgba(0,0,0,0.8);">
                    <div style="font-size:3rem; font-weight:700; text-shadow:2px 2px 4px #000;">${cData.n}</div>
                    <div style="font-size:10rem; font-weight:900; text-shadow:4px 4px 10px #000; line-height:1;">${fmt(cData.s)}</div>
                </div>`;
            } else if (cMode === 'goal') {
                const goal = document.getElementById('inp-goal')?.value || 1000;
                const perc = Math.min((cData.s / goal) * 100, 100);
                obs.innerHTML = `<div style="width:600px; text-align:center; font-family:sans-serif; color:#fff; text-shadow:2px 2px 5px #000;">
                    <div style="font-size:3rem; font-weight:bold; margin-bottom:10px;">HEDEF: ${fmt(goal)}</div>
                    <div style="width:100%; height:40px; background:rgba(0,0,0,0.5); border:3px solid #fff; border-radius:50px; overflow:hidden;">
                        <div style="width:${perc}%; height:100%; background:linear-gradient(90deg, var(--primary), var(--accent)); transition:1s;"></div>
                    </div>
                    <div style="font-size:5rem; font-weight:900; margin-top:10px;">${fmt(cData.s)}</div>
                </div>`;
            } else if (cMode === 'text') {
                const txt = new URLSearchParams(window.location.search).get('txt') || document.getElementById('inp-txt')?.value;
                const fnt = new URLSearchParams(window.location.search).get('fnt') || document.getElementById('inp-font')?.value;
                const col = new URLSearchParams(window.location.search).get('col') || document.getElementById('inp-color')?.value;
                const siz = new URLSearchParams(window.location.search).get('siz') || document.getElementById('inp-size')?.value;
                loadFont(fnt);
                obs.innerHTML = `<div style="font-family:'${fnt}', sans-serif; color:${col}; font-size:${siz}px; font-weight:900; text-shadow: 3px 3px 10px rgba(0,0,0,0.8); text-align:center;">${txt}</div>`;
            }
        }

        // --- KOPYALAMA İŞLEMİ (EKSİKSİZ PARAMETRELER) ---
        window.copyLink = () => {
            const u = new URL(window.location.href.split('?')[0]);
            u.searchParams.set('mode', 'obs');
            u.searchParams.set('tool', cMode);
            
            if(cMode === 'sub') {
                if(!cId) return alert("Önce kanal seçin!");
                u.searchParams.set('id', cId);
            } else if(cMode === 'goal') {
                if(!cId) return alert("Önce kanal seçin!");
                u.searchParams.set('id', cId);
                u.searchParams.set('goal', document.getElementById('inp-goal').value);
            } else if(cMode === 'text') {
                u.searchParams.set('txt', document.getElementById('inp-txt').value);
                u.searchParams.set('fnt', document.getElementById('inp-font').value);
                u.searchParams.set('col', document.getElementById('inp-color').value);
                u.searchParams.set('siz', document.getElementById('inp-size').value);
            }
            navigator.clipboard.writeText(u.href);
            alert("✅ OBS LİNKİ HAZIR! Yayın programınıza (Tarayıcı Kaynağı olarak) yapıştırın.");
        };

        // --- AÇILIŞ KONTROLÜ ---
        window.onload = () => {
            setMode('sub');
            const p = new URLSearchParams(window.location.search);
            if(p.get('mode') === 'obs') {
                document.body.setAttribute('data-mode', 'obs');
                cMode = p.get('tool');
                if(cMode === 'sub' || cMode === 'goal') sync(p.get('id'));
                if(cMode === 'text') render();
            }
        };
    </script>

    <script>
        if(!window.location.search.includes('mode=obs')){
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.onkeydown = (e) => {
                if(e.key === "F12" || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
                    alert("⚠️ Sistem Güvenliği: Kaynak kodlara erişim kapalıdır.");
                    return false;
                }
            };
        }
    </script>
</body>
</html>
