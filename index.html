<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Live Tools | v2.3.0 Global Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --gemini-blue: #4285f4;
            --gemini-purple: #9b72cb;
            --gemini-red: #d96570;
            --bg-dark: #000000;
            --card-bg: rgba(20, 20, 25, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Gemini Arka Plan Animasyonu */
        .bg-animate {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 30% 30%, rgba(66, 133, 244, 0.15), transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(155, 114, 203, 0.15), transparent 50%);
            filter: blur(80px); animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Ana Panel */
        .master-panel {
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px; padding: 50px;
            width: 650px; text-align: center; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* MODLAR (OBS) */
        body[data-obs="true"] .master-panel { display: none; }
        .obs-view { display: none; position: absolute; width: 100%; height: 100%; align-items: center; justify-content: center; }
        body[data-obs="true"] .obs-view { display: flex; }

        /* Sayı Akış Animasyonu */
        .count-value {
            font-size: 7rem; font-weight: 900; 
            background: linear-gradient(180deg, #fff, #777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -5px; margin: 10px 0;
        }

        /* Arama & Butonlar */
        .search-area { margin-bottom: 30px; }
        .inp {
            width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: white; font-size: 1.1rem;
        }
        .btn-grid { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .m-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #aaa; padding: 10px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .m-btn.active, .m-btn:hover { background: var(--gemini-purple); color: white; border-color: var(--gemini-purple); }

        #pfp { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--gemini-blue); margin-bottom: 15px; display: none; }
        
        /* OBS Tasarımları */
        .fsabone-layout { display: flex; align-items: center; gap: 30px; text-align: left; padding-left: 5vw; width: 100%; }
        .fsabone-layout img { width: 200px; height: 200px; border-radius: 50%; border: 6px solid var(--gemini-purple); }
        .fsabone-layout .val { font-size: 10rem; line-height: 0.8; }
        
        .fscenter-layout { text-align: center; }
        .fscenter-layout img { width: 250px; border-radius: 50%; border: 10px solid #fff; margin-bottom: 20px; box-shadow: 0 0 50px rgba(255,255,255,0.2); }
        .fscenter-layout .val { font-size: 12rem; font-weight: 900; line-height: 1; }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="obs-view" id="obsView"></div>

    <div class="master-panel">
        <div class="search-area">
            <h2 style="margin-bottom: 20px; font-weight: 800; letter-spacing: 1px;">YOUTUBE LIVE TOOLS</h2>
            <input type="text" id="sInp" class="inp" placeholder="Kanal ara ve Enter'a bas..." onkeyup="if(event.key==='Enter') window.searchChannel()">
        </div>

        <div id="displayArea">
            <img id="pfp" src="">
            <h1 id="cTitle">Sistemi Başlatın</h1>
            <div class="count-value" id="cValue">0</div>
            <p style="color: #555; font-size: 0.8rem; margin-bottom: 20px;">FIREBASE GLOBAL SYNC AKTİF</p>
        </div>

        <div class="btn-grid">
            <button class="m-btn active" onclick="window.setMode('dashboard')">Panel</button>
            <button class="m-btn" onclick="window.setMode('fsabone')">Sol OBS (fsabone)</button>
            <button class="m-btn" onclick="window.setMode('fscenter')">Merkez OBS</button>
        </div>

        <button onclick="window.copyCurrentLink()" style="width: 100%; margin-top: 25px; padding: 15px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer;">
            <i class="fas fa-link"></i> LİNKİ KOPYALA (MODE & ID)
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";
        // Realtime Database importları eklendi
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        // Senin yapılandırman
        const firebaseConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            storageBucket: "ytsayac-9efe7.firebasestorage.app",
            messagingSenderId: "877769345664",
            appId: "1:877769345664:web:b5fa6717f18e3217bfb465",
            measurementId: "G-9S9CC8N4PJ"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        // YouTube API Key (Önceki yazdığımız)
        const YT_KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';
        let currentId = '';
        let currentMode = 'dashboard';
        let visualCount = 0;

        // Sayfa Yüklendiğinde
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            const id = p.get('id');
            const mode = p.get('mode');
            
            if(id) {
                currentId = id;
                if(mode && mode !== 'dashboard') {
                    document.body.setAttribute('data-obs', 'true');
                    currentMode = mode;
                }
                listenToFirebase(id);
                // Ana paneleysek 30 saniyede bir YouTube'dan veriyi tazele
                if(!mode || mode === 'dashboard') {
                    updateFirebase(id);
                    setInterval(() => updateFirebase(id), 30000);
                }
            }
        };

        // Kanal Arama
        window.searchChannel = async function() {
            const q = document.getElementById('sInp').value;
            if(!q) return;
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&key=${YT_KEY}`);
            const data = await res.json();
            
            if(data.items && data.items[0]) {
                const id = data.items[0].id.channelId;
                currentId = id;
                
                updateFirebase(id);
                listenToFirebase(id);
                
                const url = new URL(window.location);
                url.searchParams.set('id', id);
                window.history.pushState({}, '', url);
            }
        };

        // YouTube'dan Çek, Firebase'e Yaz
        async function updateFirebase(id) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${YT_KEY}`);
            const data = await res.json();
            if(data.items && data.items[0]) {
                const info = data.items[0];
                const targetRef = ref(db, 'channels/' + id);
                
                set(targetRef, {
                    name: info.snippet.title,
                    subs: info.statistics.subscriberCount,
                    pfp: info.snippet.thumbnails.high.url, // Daha yüksek kalite çektik
                    lastUpdate: Date.now()
                });
            }
        }

        // Firebase'deki Değişimleri Dinle
        function listenToFirebase(id) {
            const channelRef = ref(db, 'channels/' + id);
            onValue(channelRef, (snapshot) => {
                const val = snapshot.val();
                if(val) renderUI(val);
            });
        }

        // Arayüzü Güncelle
        function renderUI(data) {
            const targetSubs = parseInt(data.subs);
            
            // Ana Panel
            document.getElementById('cTitle').innerText = data.name;
            document.getElementById('pfp').src = data.pfp;
            document.getElementById('pfp').style.display = 'inline-block';

            // Sayı Animasyonu
            animateValue(visualCount, targetSubs, 2000);
            visualCount = targetSubs;

            // OBS Panelleri
            if(currentMode === 'fsabone') {
                document.getElementById('obsView').innerHTML = `
                    <div class="fsabone-layout">
                        <img src="${data.pfp}">
                        <div>
                            <div style="font-size:3rem; font-weight: 800;">${data.name}</div>
                            <div class="val">${targetSubs.toLocaleString('tr-TR')}</div>
                        </div>
                    </div>`;
            } else if(currentMode === 'fscenter') {
                document.getElementById('obsView').innerHTML = `
                    <div class="fscenter-layout">
                        <img src="${data.pfp}">
                        <div style="font-size:3rem; font-weight: 800;">${data.name}</div>
                        <div class="val">${targetSubs.toLocaleString('tr-TR')}</div>
                    </div>`;
            }
        }

        // Smooth Akışkan Sayı Animasyonu
        function animateValue(start, end, duration) {
            const obj = document.getElementById("cValue");
            if (start === end) {
                obj.innerHTML = end.toLocaleString('tr-TR');
                return;
            }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                obj.innerHTML = current.toLocaleString('tr-TR');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // Mod Değiştirme
        window.setMode = function(m) {
            currentMode = m;
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        // URL Kopyalama
        window.copyCurrentLink = function() {
            if(!currentId) return alert("Lütfen önce bir kanal arayıp seçin!");
            const url = new URL(window.location.origin + window.location.pathname);
            url.searchParams.set('id', currentId);
            if(currentMode !== 'dashboard') url.searchParams.set('mode', currentMode);
            
            navigator.clipboard.writeText(url.href).then(() => {
                alert("Başarılı! " + currentMode.toUpperCase() + " modu linki kopyalandı.");
            });
        };
    </script>
</body>
</html>
