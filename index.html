<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">YT Live Studio | Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0c10; --panel: #1f2833; --accent: #66fcf1; --text: #c5c6c7;
            --danger: #ff4e50; --border: rgba(255,255,255,0.08);
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; display: flex; overflow: hidden; }

        /* --- STÜDYO ARAYÜZÜ (DASHBOARD) --- */
        .sidebar { width: 80px; background: #07080a; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--border); }
        .nav-btn { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #888; cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-size: 1.2rem; }
        .nav-btn:hover, .nav-btn.active { background: rgba(102, 252, 241, 0.1); color: var(--accent); }

        .settings-panel { width: 350px; background: var(--panel); padding: 30px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .settings-panel h2 { color: #fff; font-size: 1.2rem; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .input-base { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #111; color: #fff; font-size: 0.95rem; transition: 0.3s; }
        .input-base:focus { border-color: var(--accent); }

        .preview-area { flex: 1; display: flex; flex-direction: column; background: #121418; position: relative; }
        .preview-header { padding: 20px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .preview-box { flex: 1; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 20px 20px; position: relative; overflow: hidden; }
        
        /* OBS Render Alanı (Sınırları belli olsun diye) */
        .obs-canvas { width: 800px; height: 450px; border: 2px dashed #333; display: flex; align-items: center; justify-content: center; position: relative; }

        .btn-primary { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { box-shadow: 0 0 15px rgba(102, 252, 241, 0.4); transform: translateY(-2px); }

        /* --- OBS MODU (TAM EKRAN) --- */
        body[data-mode="obs"] .sidebar, body[data-mode="obs"] .settings-panel, body[data-mode="obs"] .preview-header { display: none !important; }
        body[data-mode="obs"] .preview-area { background: transparent; }
        body[data-mode="obs"] .preview-box { background: transparent; }
        body[data-mode="obs"] .obs-canvas { border: none; width: 100vw; height: 100vh; }

        /* --- WIDGET TASARIMLARI --- */
        .widget-sub { text-align: center; }
        .widget-sub img { border-radius: 50%; border: 6px solid var(--accent); margin-bottom: 15px; }
        .widget-sub .name { font-weight: 700; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .widget-sub .count { font-weight: 900; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); line-height: 1; }

        .widget-text { font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); text-align: center; }

        /* Arama Önerileri */
        .sug-box { position: absolute; background: #111; width: 100%; border-radius: 8px; margin-top: 5px; overflow: hidden; border: 1px solid var(--border); z-index: 100; }
        .sug-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .sug-item:hover { background: #222; }
        .sug-item img { width: 30px; height: 30px; border-radius: 50%; }

    </style>
</head>
<body data-mode="studio">

    <div class="sidebar">
        <div class="nav-btn active" onclick="switchTab('counter')" title="Abone Sayacı"><i class="fas fa-users"></i></div>
        <div class="nav-link nav-btn" onclick="switchTab('text')" title="Özel Yayın Metni"><i class="fas fa-font"></i></div>
        <div style="flex:1"></div>
        <div class="nav-btn" style="font-size: 0.8rem; color: #444;" title="v2.0.0">v2</div>
    </div>

    <div class="settings-panel" id="panel-counter">
        <h2>Abone Sayacı</h2>
        
        <div class="control-group" style="position: relative;">
            <label>YouTube Kanalı Ara</label>
            <input type="text" id="searchInput" class="input-base" placeholder="Kanal adı yaz..." onkeyup="searchChannel(this.value)">
            <div id="suggestions" class="sug-box" style="display:none;"></div>
        </div>

        <div class="control-group">
            <label>Sayac Fontu (Google Fonts)</label>
            <input type="text" id="fontSearch" class="input-base" placeholder="Örn: Bebas Neue, Roboto, Anton" value="Outfit" onchange="updateStyle()">
            <small style="color:#666; font-size:0.7rem;">Yazdığınız font anında Google'dan indirilir.</small>
        </div>

        <div class="control-group">
            <label>Metin Rengi</label>
            <input type="color" id="textColor" class="input-base" style="height: 40px; padding: 2px;" value="#ffffff" onchange="updateStyle()">
        </div>

        <div class="control-group">
            <label>Vurgu Rengi</label>
            <input type="color" id="accentColor" class="input-base" style="height: 40px; padding: 2px;" value="#66fcf1" onchange="updateStyle()">
        </div>
    </div>

    <div class="settings-panel" id="panel-text" style="display: none;">
        <h2>Özel Yayın Yazısı</h2>
        <div class="control-group">
            <label>Ekranda Ne Yazsın?</label>
            <input type="text" id="customText" class="input-base" placeholder="Örn: Kanala Abone Ol!" value="Kanala Abone Ol!" oninput="updateStyle()">
        </div>
        <div class="control-group">
            <label>Yazı Fontu</label>
            <input type="text" id="customFont" class="input-base" placeholder="Örn: Montserrat" value="Bebas Neue" onchange="updateStyle()">
        </div>
        <div class="control-group">
            <label>Yazı Rengi</label>
            <input type="color" id="customColor" class="input-base" style="height: 40px;" value="#ff4e50" onchange="updateStyle()">
        </div>
        <div class="control-group">
            <label>Boyut (px)</label>
            <input type="number" id="customSize" class="input-base" value="80" onchange="updateStyle()">
        </div>
    </div>

    <div class="preview-area">
        <div class="preview-header">
            <div>
                <span style="color:#aaa; font-size:0.9rem;">Durum:</span> 
                <span id="syncStatus" style="color:var(--accent); font-weight:bold; font-size:0.9rem;"><i class="fas fa-circle" style="font-size:0.6rem"></i> Stüdyo Hazır</span>
            </div>
            <button class="btn-primary" onclick="generateObsLink()"><i class="fas fa-link"></i> OBS Linkini Kopyala</button>
        </div>
        
        <div class="preview-box">
            <div class="obs-canvas" id="render-target">
                <div style="color:#444; font-family:sans-serif;">Ayarları yapılandırın...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, off } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            storageBucket: "ytsayac-9efe7.firebasestorage.app",
            databaseURL: "https://ytsayac-9efe7-default-rtdb.firebaseio.com",
            messagingSenderId: "877769345664",
            appId: "1:877769345664:web:b5fa6717f18e3217bfb465"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const YT_KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';

        let state = {
            tool: 'counter',
            channelId: '',
            data: null,
            font: 'Outfit',
            color: '#ffffff',
            accent: '#66fcf1',
            customTxt: 'Kanala Abone Ol!',
            customSize: '80'
        };

        let currentListener = null; // Bug'ı önleyen yapı

        // --- MATEMATİKSEL KUSURSUZ FORMAT (20M Bug'ı Çözümü) ---
        function formatNumber(num) {
            let n = Number(num);
            if (isNaN(n)) return "0";
            if (n >= 1000000) {
                return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M'; // Örn: 20000000 -> 20.0M -> 20M
            } else if (n >= 1000) {
                return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            }
            return n.toLocaleString('tr-TR');
        }

        // --- DİNAMİK FONT MOTORU ---
        window.loadFont = (fontName) => {
            if(!fontName) return;
            const linkId = 'font-' + fontName.replace(/\s+/g, '-').toLowerCase();
            if(!document.getElementById(linkId)) {
                const link = document.createElement('link');
                link.id = linkId;
                link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/\s+/g, '+')}:wght@400;700;900&display=swap`;
                link.rel = 'stylesheet';
                document.head.appendChild(link);
            }
        };

        // --- SEKME GEÇİŞİ ---
        window.switchTab = (tab) => {
            state.tool = tab;
            document.querySelectorAll('.settings-panel').forEach(p => p.style.display = 'none');
            document.getElementById('panel-' + tab).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            updateStyle();
        };

        // --- ARAMA VE ÖNERİ ---
        window.searchChannel = async (val) => {
            if(val.length < 3) return;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=4&q=${encodeURIComponent(val)}&key=${YT_KEY}`);
            const d = await r.json();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = '';
            d.items.forEach(i => {
                const div = document.createElement('div');
                div.className = 'sug-item';
                div.innerHTML = `<img src="${i.snippet.thumbnails.default.url}"> <span>${i.snippet.title}</span>`;
                div.onclick = () => { 
                    document.getElementById('searchInput').value = i.snippet.title;
                    sug.style.display = 'none';
                    connectChannel(i.id.channelId);
                };
                sug.appendChild(div);
            });
            sug.style.display = 'block';
        };

        // --- KANAL BAĞLANTISI (Bugsız Firebase) ---
        async function connectChannel(id) {
            state.channelId = id;
            document.getElementById('syncStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> YouTube\'a Bağlanılıyor...';
            
            // ESKİ DİNLEYİCİYİ İPTAL ET (Sayaç takılı kalma bug'ı çözümü)
            if(currentListener) off(currentListener);

            const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${YT_KEY}`);
            const d = await r.json();
            const c = d.items[0];

            set(ref(db, 'v2/' + id), {
                n: c.snippet.title, s: c.statistics.subscriberCount, p: c.snippet.thumbnails.high.url
            });

            currentListener = ref(db, 'v2/' + id);
            onValue(currentListener, (snap) => {
                state.data = snap.val();
                document.getElementById('syncStatus').innerHTML = '<i class="fas fa-circle" style="color:#0f0; font-size:0.6rem"></i> Canlı Veri Aktif';
                updateStyle();
            });
        }

        // --- EKRAN RENDER MOTORU ---
        window.updateStyle = () => {
            const rt = document.getElementById('render-target');
            
            // Renkleri Değişkenlere Ata
            document.documentElement.style.setProperty('--accent', document.getElementById('accentColor')?.value || '#66fcf1');
            state.color = document.getElementById('textColor')?.value || '#fff';
            
            if(state.tool === 'counter') {
                const fName = document.getElementById('fontSearch').value || 'Outfit';
                loadFont(fName);
                if(!state.data) { rt.innerHTML = '<div style="color:#666;">Kanal Bekleniyor...</div>'; return; }
                
                rt.innerHTML = `
                    <div class="widget-sub" style="font-family: '${fName}', sans-serif; color: ${state.color};">
                        <img src="${state.data.p}" style="width: 180px;">
                        <div class="name" style="font-size: 2.5rem;">${state.data.n}</div>
                        <div class="count" style="font-size: 9rem;">${formatNumber(state.data.s)}</div>
                    </div>
                `;
            } 
            else if (state.tool === 'text') {
                const cTxt = document.getElementById('customText').value;
                const cFont = document.getElementById('customFont').value;
                const cColor = document.getElementById('customColor').value;
                const cSize = document.getElementById('customSize').value;
                
                loadFont(cFont);
                rt.innerHTML = `
                    <div class="widget-text" style="font-family: '${cFont}', sans-serif; color: ${cColor}; font-size: ${cSize}px;">
                        ${cTxt}
                    </div>
                `;
            }
        };

        // --- OBS LİNK OLUŞTURUCU ---
        window.generateObsLink = () => {
            const u = new URL(window.location.href.split('?')[0]);
            u.searchParams.set('mode', 'obs');
            u.searchParams.set('tool', state.tool);
            
            if(state.tool === 'counter') {
                if(!state.channelId) return alert("Kanal seçmediniz!");
                u.searchParams.set('id', state.channelId);
                u.searchParams.set('font', document.getElementById('fontSearch').value);
                u.searchParams.set('color', document.getElementById('textColor').value);
                u.searchParams.set('accent', document.getElementById('accentColor').value);
            } else if (state.tool === 'text') {
                u.searchParams.set('txt', document.getElementById('customText').value);
                u.searchParams.set('font', document.getElementById('customFont').value);
                u.searchParams.set('color', document.getElementById('customColor').value.replace('#',''));
                u.searchParams.set('size', document.getElementById('customSize').value);
            }
            
            navigator.clipboard.writeText(u.href);
            alert("✅ OBS Linki Hazır! Ayarlarınızla birlikte kopyalandı.");
        };

        // --- AÇILIŞ / OBS YÜKLEMESİ ---
        window.onload = () => {
            const p = new URLSearchParams(window.location.search);
            if(p.get('mode') === 'obs') {
                document.body.setAttribute('data-mode', 'obs');
                state.tool = p.get('tool');
                
                if(state.tool === 'counter') {
                    document.getElementById('fontSearch').value = p.get('font');
                    document.getElementById('textColor').value = p.get('color');
                    document.getElementById('accentColor').value = p.get('accent');
                    connectChannel(p.get('id'));
                } else if(state.tool === 'text') {
                    document.getElementById('customText').value = p.get('txt');
                    document.getElementById('customFont').value = p.get('font');
                    document.getElementById('customColor').value = '#' + p.get('color');
                    document.getElementById('customSize').value = p.get('size');
                    updateStyle();
                }
            } else {
                updateStyle();
            }
        };
    </script>
</body>
</html>
