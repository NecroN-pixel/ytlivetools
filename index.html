<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Live Tools | All-in-One Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4285f4;
            --accent: #9b72cb;
            --bg: #030303;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }

        /* --- SIDEBAR & NAV --- */
        .sidebar {
            position: fixed; left: -260px; top: 0; width: var(--sidebar-w); height: 100%;
            background: #0a0a0a; border-right: 1px solid #1a1a1a; z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px;
        }
        .sidebar.active { left: 0; }
        
        .menu-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1001;
            background: var(--primary); border: none; color: white;
            width: 45px; height: 45px; border-radius: 10px; cursor: pointer;
        }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 14px;
            color: #777; text-decoration: none; border-radius: 10px; margin-bottom: 8px; transition: 0.2s;
        }
        .nav-link:hover, .nav-link.active { background: rgba(66, 133, 244, 0.15); color: #fff; }

        /* --- CONTENT --- */
        .container {
            margin-left: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; transition: 0.3s;
        }

        .card {
            background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 30px;
            padding: 30px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* --- COUNTER STYLES --- */
        .count-main { font-size: 5rem; font-weight: 900; color: #fff; margin: 15px 0; letter-spacing: -2px; }
        .pfp { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 15px; display: none; }
        
        .input-box {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #222;
            background: #151515; color: #fff; margin-bottom: 15px;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .count-main { font-size: 3.5rem; }
            .card { padding: 20px; }
        }

        /* OBS FULL SCREEN MODES */
        body[data-obs="true"] .sidebar, body[data-obs="true"] .menu-btn { display: none; }
        body[data-obs="true"] .container { margin: 0; padding: 0; }
        body[data-obs="true"] .card { border: none; background: transparent; max-width: 100%; box-shadow: none; }

    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 30px; font-weight: 900;">LIVE TOOLS</h2>
        <a href="#" class="nav-link active" onclick="showTool('counter')"><i class="fas fa-users"></i> Abone Sayacı</a>
        <a href="#" class="nav-link" onclick="showTool('goal')"><i class="fas fa-bullseye"></i> Hedef Barı (Goal)</a>
        <a href="#" class="nav-link" onclick="showTool('chat')"><i class="fas fa-comments"></i> Chat Widget</a>
        <a href="#" class="nav-link" onclick="showTool('alerts')"><i class="fas fa-bell"></i> Bildirim Paneli</a>
        <a href="#" class="nav-link" onclick="showTool('thumb')"><i class="fas fa-image"></i> Küçük Resim Testi</a>
    </div>

    <div class="container">
        <div class="card" id="mainCard">
            <div id="tool-title" style="color: var(--primary); font-weight: 700; font-size: 0.8rem; margin-bottom: 20px;">ABONE SAYACI</div>
            
            <input type="text" id="qInput" class="input-box" placeholder="Kanal ismi yaz..." onkeyup="if(event.key==='Enter') search()">
            
            <div id="content-box">
                <img src="" id="cImage" class="pfp">
                <h2 id="cName" style="font-weight: 700;">Bir Kanal Seçin</h2>
                <div id="cCount" class="count-main">0</div>
                <div id="cSmall" style="color: #444; font-weight: 500;">Canlı Senkronizasyon</div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button onclick="setMode('fscenter')" style="flex:1; background:#1a1a1a; color:#fff; border:none; padding:12px; border-radius:10px; cursor:pointer;">OBS Modu</button>
                <button onclick="copy()" style="flex:1; background:var(--primary); color:#fff; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold;">Kopyala</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzyMRYO6GjUpqTtKP9iY747U9P0QHIBN8",
            authDomain: "ytsayac-9efe7.firebaseapp.com",
            projectId: "ytsayac-9efe7",
            storageBucket: "ytsayac-9efe7.firebasestorage.app",
            databaseURL: "https://ytsayac-9efe7-default-rtdb.firebaseio.com",
            messagingSenderId: "877769345664",
            appId: "1:877769345664:web:b5fa6717f18e3217bfb465"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const YT_KEY = 'AIzaSyArrl6SPjBroMSzpKEsWCrLHzm3PgI1mhw';

        let curId = '';
        let curMode = '';

        // --- SAYI KISALTMA (3.7K FORMATI) ---
        function formatCount(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return num;
        }

        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('active');

        window.search = async () => {
            const q = document.getElementById('qInput').value;
            const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${encodeURIComponent(q)}&key=${YT_KEY}`);
            const d = await r.json();
            if(d.items[0]) {
                curId = d.items[0].id.channelId;
                updateAndListen(curId);
            }
        };

        async function updateAndListen(id) {
            const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${id}&key=${YT_KEY}`);
            const d = await r.json();
            if(d.items[0]) {
                const c = d.items[0];
                set(ref(db, 'channels/' + id), {
                    n: c.snippet.title,
                    s: c.statistics.subscriberCount,
                    p: c.snippet.thumbnails.medium.url
                });
                onValue(ref(db, 'channels/' + id), (s) => render(s.val()));
            }
        }

        function render(data) {
            if(!data) return;
            document.getElementById('cName').innerText = data.n;
            document.getElementById('cImage').src = data.p;
            document.getElementById('cImage').style.display = 'inline-block';
            
            // Sayı hem tam hem kısa formatta gösterilsin
            const num = parseInt(data.s);
            document.getElementById('cCount').innerText = formatCount(num);
            document.getElementById('cSmall').innerText = "Resmi: " + num.toLocaleString('tr-TR');
        }

        window.showTool = (tool) => {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tool-title').innerText = tool.toUpperCase() + " TOOL";
            toggleMenu();
            if(tool !== 'counter') alert(tool + " yakında yeni API güncellemeleriyle eklenecek!");
        };

        window.setMode = (m) => { curMode = m; alert("OBS Modu Seçildi."); };

        window.copy = () => {
            const u = new URL(window.location.href);
            u.searchParams.set('id', curId);
            if(curMode) u.searchParams.set('mode', curMode);
            navigator.clipboard.writeText(u.href);
            alert("Linki Kopyaladık, OBS'e yapıştırabilirsin!");
        };

        // URL Kontrolü (Açılışta)
        const params = new URLSearchParams(window.location.search);
        if(params.get('id')) {
            if(params.get('mode')) document.body.setAttribute('data-obs', 'true');
            updateAndListen(params.get('id'));
        }
    </script>
</body>
</html>
